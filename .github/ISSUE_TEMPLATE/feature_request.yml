name: 功能建议
description: 提议新的日历功能、交互或可访问性改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 你遇到了什么问题，或希望完成什么任务？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的界面、交互或数据表现。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案或补充信息
